name: Amém Ungidos CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check HTML Integrity (Grep Search)
        run: |
          echo "Iniciando Varredura Zero Defeitos..."
          # Verifica se há links quebrados básicos
          grep -r "href=\"#\"" . || echo "Nenhum link vazio encontrado."

      - name: Validate Styling Consistency
        run: |
          echo "Verificando Padrão Teatro Amazonas..."
          # Verifica se o global.css está presente
          ls FRONTEND/public/styles/global.css
