<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Ungido - Amém</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/FRONTEND/public/styles/global.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .logo-aura {
            filter: drop-shadow(0 0 30px rgba(200, 169, 81, 0.4));
            animation: pulse-led 4s infinite ease-in-out;
        }
        @keyframes pulse-led {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white/5 border border-white/10 p-8 rounded-[32px] backdrop-blur-xl animate-fade-in">
        <div class="text-center mb-10">
            <div class="elite-heart-v2 logo-aura mx-auto mb-6 w-28 h-28">
                <img src="/public/assets/logo-premium.png" alt="Amém Ungidos">
            </div>
            <h1 class="text-32 font-black uppercase tracking-tight mb-2">Acesso <span class="text-premium-gold">Ungido</span></h1>
            <p class="text-white/50 lowercase">Acesse sua jornada de maturidade espiritual.</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-12 uppercase tracking-widest text-white/50 mb-2">E-mail</label>
                <input type="email" id="email" required 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-premium-gold transition-all"
                       placeholder="exemplo@email.com">
            </div>
            <div>
                <label class="block text-12 uppercase tracking-widest text-white/50 mb-2">Senha</label>
                <input type="password" id="password" required 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-premium-gold transition-all"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" 
                    class="btn-premium shimmer-gold w-full h-14 rounded-xl font-black uppercase tracking-widest flex items-center justify-center">
                Entrar
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-14 text-white/50">Não tem uma conta? <a href="/FRONTEND/signup.html" class="text-premium-gold font-bold">Cadastre-se</a></p>
        </div>
    </div>

    <script type="module">
        import { AuthService } from './public/scripts/auth_service.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await AuthService.signIn(email, password);
                window.location.href = '/FRONTEND/index.html';
            } catch (error) {
                alert('Erro ao entrar: ' + error.message);
            }
        });
    </script>
</body>
</html>
