<!doctype html>

<head>

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />

  <title>Amém - Sua Jornada Ungida</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet" />

    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            navy: {
              deep: "#050B18",
              surface: "#0D1B3E",
            },
            gold: {
              premium: "#C8A951",
              hover: "#B5963E",
            },
            stone: {
              offwhite: "#FAF7F0",
            },
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            serif: ["Playfair Display", "serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/public/styles/global.css?v=ELITE_ULTRA_FIX_1000" />
  <style>
  </style>
</head>

<body
  class="bg-stone-offwhite dark:bg-navy-deep text-slate-800 dark:text-white transition-colors duration-500 min-h-screen flex items-center justify-center p-6 font-sans">
  <!-- Theme Toggle (Temporary visual helper for dev before putting in a proper corner) -->
  <button onclick="document.documentElement.classList.toggle('dark')"
    class="fixed top-4 right-4 z-50 p-3 bg-navy-surface border border-white/20 rounded-full shadow-2xl text-premium-gold hover:scale-110 transition-all">
    <span class="material-symbols-outlined block dark:hidden">dark_mode</span>
    <span class="material-symbols-outlined hidden dark:block">light_mode</span>
  </button>

  <div class="max-w-4xl w-full text-center space-y-12 animate-fade-in relative z-10">
    <!-- Logo Section Purificada v12 -->
    <div class="relative inline-block mt-8 section-logo-elite">
      <div class="absolute inset-0 bg-gold-premium opacity-10 blur-3xl rounded-full"></div>
      <div class="logo-pura mx-auto w-64 h-64 flex items-center justify-center logo-aura">
        <svg viewBox="0 0 24 24" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
          <!-- Coração Premium -->
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            fill="#C8A951" />
          <!-- Cruz Minimalista Centrada -->
          <path d="M11 6.5h2v4h4v2h-4v6h-2v-6h-4v-2h4v-4z" fill="#050B18" />
        </svg>
      </div>
    </div>

    <!-- Content Section -->
    <header class="space-y-6">
      <h1 class="font-serif text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 dark:text-white leading-tight">
        Abandone o <span class="text-gold-premium italic">Raso</span>.<br />
        Mergulhe no <span class="text-gold-premium italic">Profundo</span>.
      </h1>
      <p class="text-lg md:text-xl text-slate-600 dark:text-white/70 max-w-2xl mx-auto font-medium leading-relaxed">
        Sua mentoria cristã personalizada, fundamentada na Palavra, disponível
        24h para cada passo da sua caminhada.
      </p>
    </header>

    <!-- Hero CTA Unitário -->
    <div class="space-y-6">
      <button onclick="startQuiz()"
        class="bg-gold-premium hover:bg-gold-hover text-navy-deep px-12 py-6 rounded-2xl text-xl font-black uppercase tracking-widest flex items-center gap-3 mx-auto shadow-[0_15px_40px_rgba(200,169,81,0.25)] transition-all active:scale-95 shimmer-gold">
        <span class="material-symbols-outlined font-bold text-2xl">church</span>
        Começar Minha Jornada
      </button>
      <p class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-slate-400 dark:text-white/40 font-bold">
        Inicie sua jornada espiritual AIOS
      </p>
    </div>

    <!-- Quiz Hub Area -->
    <div id="quiz-container" class="mt-8 transition-all">
    </div>
  </div>

  <!-- Scripts de Funcionalidade Ungidos -->
  <script type="module" src="./public/scripts/quiz.js?v=2"></script>
  <script>
    // [🚀] ELITE MASTER RESET & ADMIN GATEWAY
    (function () {
      const params = new URLSearchParams(window.location.search);

      // Hard Reset for Cache Issues
      if (params.has('reset')) {
        console.log('🧹 [Master] Executando Hard Reset...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) registration.unregister();
          });
        }
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        localStorage.clear();
        alert('Sistema Resetado. Recarregando versão Elite.');
        window.location.href = window.location.pathname;
      }

      // Master Access for Henrique
      if (params.get('master') === 'nogueira') {
        console.log('👑 [Master] Acesso Henrique Identificado.');
        localStorage.setItem('amem_user_status', JSON.stringify({ isPremium: true, role: 'admin' }));
        alert('Acesso Master Ativado, Henrique. Explore o Amém IA v10 Elite.');
      }
    })();

    // UI Version Tag (Discreet)
    const versionTag = document.createElement('div');
    versionTag.className = 'fixed bottom-2 right-2 text-[8px] opacity-20 pointer-events-none select-none';
    versionTag.innerText = 'v10.0.0-ELITE';
    document.body.appendChild(versionTag);

    window.scrollToSection = function (id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: "smooth" });
    };

    window.startQuiz = function () {
      if (window.QuizEngine) {
        window.QuizEngine.init();
      } else {
        console.warn("[⚠️] QuizEngine ainda carregando...");
        const btn = document.querySelector("#quiz-container button");
        if (btn) btn.innerText = "Carregando...";
        setTimeout(() => {
          if (window.QuizEngine) window.QuizEngine.init();
        }, 1000);
      }
    };

    // Improved SW Registration
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js?v=10", { scope: '/' })
          .then((reg) => {
            console.log("🛡️ [Service Worker] Ativo:", reg.scope);
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  alert('Nova atualização disponível! O Amém IA será recarregado.');
                  window.location.reload();
                }
              };
            };
          })
          .catch((err) => console.log("❌ [Service Worker] Erro:", err));
      });
    }

    // Connectivity Monitor
    function updateConnectionStatus() {
      const status = navigator.onLine
        ? "Online"
        : "Suporte no Deserto (Offline)";
      const btn = document.querySelector(".btn-ungido");
      if (!navigator.onLine) {
        console.log("🌵 [Modo Offline] Ativado.");
        if (btn)
          btn.innerHTML = `<span class="material-symbols-outlined">cloud_off</span> ${status}`;
      } else {
        if (btn)
          btn.innerHTML = `<span class="material-symbols-outlined">church</span> Identificar Meu Momento`;
      }
    }
    window.addEventListener("online", updateConnectionStatus);
    window.addEventListener("offline", updateConnectionStatus);
    updateConnectionStatus();
  </script>
</body>

</html>
