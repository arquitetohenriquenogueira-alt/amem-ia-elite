<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <title>Avatar Personalizado - Amém</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "premium-gold": "#C8A951",
                        "deep-navy": "#0A1229",
                        "light-grey": "#F2F2F7",
                        "app-background": "#050B18",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif-title": ["Poppins", "sans-serif"]
                    },
                    borderRadius: {
                        "premium": "12px",
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bento-card {
                @apply bg-white/5 backdrop-blur-md rounded-premium p-4 transition-all duration-300 active:scale-[0.98] border border-white/5;
            }
            .bento-card-active {
                @apply bg-premium-gold/20 ring-1 ring-premium-gold border-premium-gold/50;
            }
            .preview-container {
                box-shadow: 0 10px 40px rgba(5, 11, 24, 0.5);
            }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-[#050B18] font-display text-white antialiased overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col">
        <header
            class="flex flex-col items-center pt-14 pb-10 px-6 sticky top-0 z-50 bg-[#050B18]/80 backdrop-blur-md border-b border-white/5">
            <div class="flex items-center justify-between w-full mb-2">
                <a href="/stitch/auth-v2/code.html"
                    class="flex size-10 items-center justify-center rounded-full bg-white/5 text-white active:scale-95 transition-transform">
                    <span class="material-symbols-outlined text-xl font-black">arrow_back_ios_new</span>
                </a>
                <div class="flex flex-col items-center">
                    <h1
                        class="text-3xl font-black tracking-tight text-white drop-shadow-[0_2px_10px_rgba(200,169,81,0.3)] uppercase">
                        Amém</h1>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-premium-gold">Personalizar
                        Avatar</span>
                </div>
                <div class="size-10"></div>
            </div>
        </header>
        <main class="flex-1 flex flex-col px-6 pt-4 gap-8 pb-40">
            <div
                class="relative w-full aspect-[4/5] rounded-premium overflow-hidden bg-white/5 preview-container border border-white/5">
                <img alt="Adult spiritual avatar" class="absolute inset-0 w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAx1TPCmrHhga4VmslczwXeBO8lQFWAcv7DsyWob1yxzdDIb4oWoYHkbr_HubR_l6Zi-3QnuO-sswIdHKJ-WJmTISgHhVEk80PWsEr2JlnoGsWT4fHYGtaZ6og4YNA45xf3LYC-xpuPn3zSjQmwhABLDL-Aw9yJrERYqFrL1fhEb6vvw70-CNmvSzyza6jeE6XPiwE0DfOKEUsrqnsZEmQ4qUMapb1C_ue9QXgdTzwqOg9thwp_zRrZQyWaOhCecLRC8W0wgTD17cDL" />
                <div class="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/5">
                    via-transparent to-transparent"></div>
                <div
                    class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 px-4 py-2 bg-white/90 backdrop-blur-md rounded-full border border-gray-100 shadow-sm">
                    <span class="material-symbols-outlined text-premium-gold text-sm">360</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-deep-navy">Preview 3D</span>
                </div>
            </div>
            <div class="space-y-8">
                <section>
                    <h2
                        class="font-serif-title text-sm font-black uppercase tracking-widest text-premium-gold mb-4 px-1">
                        Estilos de Trajes</h2>
                    <div class="grid grid-cols-3 gap-3">
                        <button class="bento-card bento-card-active flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-premium-gold">temple_hindu</span>
                            <span class="text-[10px] font-black text-white uppercase">Monástico</span>
                        </button>
                        <button class="bento-card flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-gray-400">apparel</span>
                            <span class="text-[10px] font-bold text-gray-400">Clássico</span>
                        </button>
                        <button class="bento-card flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-gray-400">auto_awesome</span>
                            <span class="text-[10px] font-bold text-gray-400">Celestial</span>
                        </button>
                    </div>
                </section>
                <section>
                    <h2
                        class="font-serif-title text-sm font-black uppercase tracking-widest text-premium-gold mb-4 px-1">
                        Símbolos Sagrados</h2>
                    <div class="grid grid-cols-4 gap-3">
                        <button class="bento-card flex items-center justify-center aspect-square p-0">
                            <span class="material-symbols-outlined text-gray-400">church</span>
                        </button>
                        <button class="bento-card bento-card-active flex items-center justify-center aspect-square p-0">
                            <span class="material-symbols-outlined text-premium-gold">flare</span>
                        </button>
                        <button class="bento-card flex items-center justify-center aspect-square p-0">
                            <span class="material-symbols-outlined text-gray-400">water_drop</span>
                        </button>
                        <button class="bento-card flex items-center justify-center aspect-square p-0">
                            <span class="material-symbols-outlined text-gray-400">local_fire_department</span>
                        </button>
                    </div>
                </section>
                <section class="bg-white/5 backdrop-blur-md rounded-premium p-6 space-y-6 border border-white/5">
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black uppercase tracking-widest text-white/60">Luz da
                                Aura</label>
                            <span class="text-[10px] font-bold text-premium-gold">75%</span>
                        </div>
                        <div class="relative h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                            <div class="absolute h-full w-3/4 bg-premium-gold shadow-[0_0_10px_rgba(200,169,81,0.5)]">
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

    </div>

    <script src="/auth.js"></script>
</body>

</html>
