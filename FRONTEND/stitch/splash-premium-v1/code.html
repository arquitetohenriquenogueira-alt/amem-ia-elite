<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Amém - Ungidos Splash</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            deep: '#050B18',
                            surface: '#0D1B3E'
                        },
                        gold: {
                            premium: '#C8A951',
                            hover: '#B5963E'
                        },
                        stone: {
                            offwhite: '#FAF7F0'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        .logo-aura {
            filter: drop-shadow(0 0 30px rgba(200, 169, 81, 0.4));
            animation: pulse-gold 4s infinite ease-in-out;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 0.8; transform: scale(1); filter: drop-shadow(0 0 20px rgba(200, 169, 81, 0.3)); }
            50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(200, 169, 81, 0.6)); }
        }
    </style>
</head>

<body class="bg-stone-offwhite dark:bg-navy-deep text-slate-800 dark:text-white transition-colors duration-500 min-h-screen flex items-center justify-center overflow-hidden p-6 font-sans select-none relative">
    
    <!-- Theme Toggle (Temporary Dev) -->
    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-4 right-4 z-50 p-2 bg-white/50 dark:bg-black/20 backdrop-blur-md rounded-full border border-black/5 dark:border-white/5 shadow-sm text-slate-600 dark:text-white/70 hover:scale-105 transition-all">
        <span class="material-symbols-outlined block dark:hidden">dark_mode</span>
        <span class="material-symbols-outlined hidden dark:block">light_mode</span>
    </button>

    <!-- Background Decoration -->
    <div class="absolute inset-0 pointer-events-none opacity-40 dark:opacity-20 bg-[radial-gradient(circle_at_center,_rgba(200,169,81,0.15)_0%,_transparent_60%)]"></div>

    <div class="flex flex-col items-center justify-center space-y-12 w-full max-w-md animate-in fade-in duration-1000 relative z-10">
        
        <!-- Minimalist Logo Section -->
        <div class="relative flex flex-col items-center justify-center">
             <div class="absolute inset-0 bg-gold-premium opacity-10 dark:opacity-20 blur-3xl rounded-full scale-150"></div>
             <img src="/public/assets/logo-ungidos-v3.png" alt="Amém Ungidos" class="w-48 h-48 md:w-56 md:h-56 object-contain logo-aura relative z-10">
        </div>

        <!-- Text Section -->
        <div class="text-center space-y-3 pt-6">
            <h1 class="font-serif text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight flex items-center justify-center gap-2">
                Amém <span class="text-gold-premium italic">IA</span>
            </h1>
            <p class="text-slate-500 dark:text-white/60 text-sm font-medium leading-relaxed max-w-[280px] mx-auto uppercase tracking-widest">
                Sua Jornada Devocional Premium
            </p>
        </div>

        <!-- Action Button -->
        <div class="w-full pt-8">
            <button onclick="startApp()" 
                class="w-full bg-gold-premium hover:bg-gold-hover text-navy-deep font-black py-5 rounded-2xl text-sm md:text-base uppercase tracking-widest shadow-[0_10px_30px_rgba(200,169,81,0.2)] dark:shadow-[0_10px_40px_rgba(200,169,81,0.15)] active:scale-95 transition-all">
                Iniciar Minha Jornada
            </button>
        </div>

    </div>

    <script>
        // Previne o loop no Hub adicionando um flag de "entrada real"
        function startApp() {
            window.location.href = '../../index.html?mode=app';
        }
    </script>
</body>

</html>
