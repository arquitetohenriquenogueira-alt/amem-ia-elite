<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Amém - Ungidos Splash</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../public/styles/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            deep: '#050B18',
                            surface: '#0D1B3E'
                        },
                        gold: {
                            premium: '#C8A951',
                            hover: '#B5963E'
                        },
                        stone: {
                            offwhite: '#FAF7F0'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        .logo-aura {
            filter: drop-shadow(0 0 30px rgba(200, 169, 81, 0.4));
            animation: pulse-gold 4s infinite ease-in-out;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 0.8; transform: scale(1); filter: drop-shadow(0 0 20px rgba(200, 169, 81, 0.3)); }
            50% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(200, 169, 81, 0.6)); }
        }

        /* [⭐] ELITE NUCLEAR FIX V10 */
        .elite-heart-v2 {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: linear-gradient(135deg, #FFE4A3 0%, #C8A951 45%, #8A6E2F 100%) !important;
            overflow: hidden !important;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') !important;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') !important;
            -webkit-mask-size: 100% 100% !important;
            mask-size: 100% 100% !important;
            -webkit-mask-repeat: no-repeat !important;
            mask-repeat: no-repeat !important;
        }

        .elite-heart-v2 img {
            position: absolute !important;
            width: 60% !important; /* REDUZIDO PARA 60% - ESPAÇO TOTAL PARA "AMÉM IA" */
            height: auto !important;
            top: 45% !important; 
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            object-fit: contain !important;
            background: #050B18 !important;
            z-index: 10 !important;
            mask-image: none !important;
            -webkit-mask-image: none !important;
        }

        /* [⭐] ELITE ULTIMATE FIX: POSICIONAMENTO POR COORDENADAS */
        .elite-heart-v2 {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: linear-gradient(135deg, #FFE4A3 0%, #C8A951 45%, #8A6E2F 100%) !important;
            overflow: hidden !important;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') !important;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') !important;
            -webkit-mask-size: 100% 100% !important;
            mask-size: 100% 100% !important;
            -webkit-mask-repeat: no-repeat !important;
            mask-repeat: no-repeat !important;
            -webkit-mask-position: center !important;
            mask-position: center !important;
        }

        /* O SEGREDO: Logo MENOR (70%) dentro de Coração MAIOR */
        .elite-heart-v2 img {
            position: absolute !important;
            width: 70% !important; /* Reduzido para garantir que o A lateral não seja cortado */
            height: auto !important;
            top: 48% !important; 
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            object-fit: contain !important;
            background: #050B18 !important;
            z-index: 10 !important;
        }
    </style>
</head>

<body class="bg-stone-offwhite dark:bg-navy-deep text-slate-800 dark:text-white transition-colors duration-500 min-h-screen flex items-center justify-center overflow-hidden p-6 font-sans select-none relative">
    
    <!-- Theme Toggle (Temporary Dev) -->
    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-4 right-4 z-50 p-2 bg-white/50 dark:bg-black/20 backdrop-blur-md rounded-full border border-black/5 dark:border-white/5 shadow-sm text-slate-600 dark:text-white/70 hover:scale-105 transition-all">
        <span class="material-symbols-outlined block dark:hidden">dark_mode</span>
        <span class="material-symbols-outlined hidden dark:block">light_mode</span>
    </button>

    <!-- Background Decoration -->
    <div class="absolute inset-0 pointer-events-none opacity-40 dark:opacity-20 bg-[radial-gradient(circle_at_center,_rgba(200,169,81,0.15)_0%,_transparent_60%)]"></div>

    <div class="flex flex-col items-center justify-center space-y-12 w-full max-w-md animate-in fade-in duration-1000 relative z-10">
        
        <!-- Minimalist Logo Section -->
        <div class="relative flex flex-col items-center justify-center">
             <div class="absolute inset-0 bg-gold-premium opacity-10 dark:opacity-20 blur-3xl rounded-full scale-150"></div>
              <div class="elite-heart-v2 logo-aura relative z-10 w-64 h-64 md:w-72 md:h-72">
                <img src="/public/assets/logo-premium.png" alt="Amém Ungidos">
              </div>
        </div>

        <!-- Text Section -->
        <div class="text-center space-y-3 pt-6">
            <h1 class="font-serif text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight flex items-center justify-center gap-2">
                Amém <span class="text-gold-premium italic">IA</span>
            </h1>
            <p class="text-slate-500 dark:text-white/60 text-sm font-medium leading-relaxed max-w-[280px] mx-auto uppercase tracking-widest">
                Sua Jornada Devocional Premium
            </p>
        </div>

        <!-- Action Button -->
        <div class="w-full pt-8">
            <button onclick="startApp()" 
                class="w-full bg-gold-premium hover:bg-gold-hover text-navy-deep font-black py-5 rounded-2xl text-sm md:text-base uppercase tracking-widest shadow-[0_10px_30px_rgba(200,169,81,0.2)] dark:shadow-[0_10px_40px_rgba(200,169,81,0.15)] active:scale-95 transition-all">
                Iniciar Minha Jornada
            </button>
        </div>

    </div>

    <script>
        console.log("🛡️ [ELITE] NUCLEAR LOGO FIX V10 ACTIVATED");
        // Previne o loop no Hub adicionando um flag de "entrada real"
        function startApp() {
            window.location.href = '../../index.html?mode=app';
        }

        // Kill Service Worker to force fresh logo
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
</body>

</html>
