<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Amém</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="apple-mobile-web-app-title" content="Amém">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="/FRONTEND/stitch/theme-switcher.js" type="module"></script>
    <link rel="stylesheet" href="/public/styles/global.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            deep: '#050B18',
                            surface: '#0D1B3E'
                        },
                        gold: {
                            premium: '#C8A951',
                            hover: '#B5963E'
                        },
                        stone: {
                            offwhite: '#FAF7F0'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }
        .symbol-filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
    <script src="/auth.js"></script>
</head>

<body class="antialiased font-sans bg-stone-offwhite dark:bg-navy-deep text-slate-800 dark:text-white transition-colors duration-500">
    <div
        class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col bg-white dark:bg-navy-surface/50 overflow-hidden shadow-2xl dark:shadow-none border-[8px] border-white dark:border-white/5 rounded-[3rem] p-6 pb-32">
        <div class="flex items-center justify-between w-full mb-10">
            <button onclick="window.location.href='/stitch/kids-modo-2/code.html'"
                class="size-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/5 text-slate-800 dark:text-white active:scale-90 transition-transform">
                <span class="material-symbols-outlined font-black">chevron_left</span>
            </button>
            <div class="flex flex-col items-center">
                <div class="size-12 bg-gold-premium/10 rounded-full flex items-center justify-center mb-1">
                    <span class="material-symbols-outlined text-gold-premium text-2xl font-black symbol-filled">church</span>
                </div>
                <h1
                    class="text-4xl font-serif font-black text-slate-900 dark:text-white tracking-tight flex items-center gap-1">
                    Amém <span class="text-gold-premium italic">IA</span></h1>
                <p class="text-gold-premium text-[10px] font-black tracking-[0.4em] uppercase mt-2">Jornada Premium
                </p>
            </div>
            <button onclick="document.documentElement.classList.toggle('dark')"
                class="size-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/5 text-slate-800 dark:text-white active:scale-90 transition-transform">
                <span class="material-symbols-outlined font-black dark:hidden">dark_mode</span>
                <span class="material-symbols-outlined font-black hidden dark:block">light_mode</span>
            </button>
        </div>

        <div id="login-form">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">E-mail</label>
                    <input type="email"
                        class="w-full bg-slate-50 dark:bg-white/5 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-gold-premium focus:ring-1 focus:ring-gold-premium outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                        placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Senha</label>
                    <input type="password"
                        class="w-full bg-slate-50 dark:bg-white/5 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-gold-premium focus:ring-1 focus:ring-gold-premium outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                        placeholder="••••••••">
                </div>
                <button onclick="simulateLogin()"
                    class="w-full bg-gold-premium hover:bg-gold-hover text-navy-deep font-bold py-4 rounded-2xl shadow-[0_5px_20px_rgba(200,169,81,0.2)] dark:shadow-[0_5px_20px_rgba(200,169,81,0.15)] active:scale-95 transition-all">Entrar</button>
            </div>
            <p class="mt-6 text-center text-sm text-slate-400">
                Não tem uma conta? <button onclick="toggleForm()" class="text-primary font-bold">Cadastre-se</button>
            </p>
        </div>

        <div id="signup-form" class="hidden">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Nome
                        Completo</label>
                    <input id="signup-name" type="text"
                        class="w-full bg-slate-50 dark:bg-white/5 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-gold-premium focus:ring-1 focus:ring-gold-premium outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                        placeholder="Seu nome">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">E-mail</label>
                    <input type="email"
                        class="w-full bg-slate-50 dark:bg-white/5 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-gold-premium focus:ring-1 focus:ring-gold-premium outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                        placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Senha</label>
                    <input type="password"
                        class="w-full bg-slate-50 dark:bg-white/5 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-gold-premium focus:ring-1 focus:ring-gold-premium outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                        placeholder="••••••••">
                </div>
                <button onclick="simulateSignup()"
                    class="w-full bg-gold-premium hover:bg-gold-hover text-navy-deep font-bold py-4 rounded-2xl shadow-[0_5px_20px_rgba(200,169,81,0.2)] dark:shadow-[0_5px_20px_rgba(200,169,81,0.15)] active:scale-95 transition-all">Criar
                    Conta</button>
            </div>
            <p class="mt-6 text-center text-sm text-slate-400">
                Já tem uma conta? <button onclick="toggleForm()" class="text-gold-premium font-bold">Login</button>
            </p>
        </div>

        <div id="profile-view" class="hidden text-center">
            <div id="profile-photo-container"
                class="size-24 bg-gold-premium/10 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-gold-premium overflow-hidden">
                <span id="profile-icon" class="material-symbols-outlined text-5xl text-gold-premium">person</span>
                <img id="profile-img" src="" alt="Foto de perfil" class="hidden w-full h-full object-cover">
            </div>
            <h2 id="profile-name" class="text-2xl font-serif font-black text-slate-900 dark:text-white mb-1">Usuário</h2>
            <p id="profile-email" class="text-slate-500 dark:text-slate-400 text-sm mb-6">user@example.com</p>

            <div id="premium-badge"
                class="hidden mb-6 bg-gold-premium/10 border border-gold-premium text-gold-premium px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest">
                Plano Abençoado Ativo
            </div>

            <div class="space-y-3">
                <a href="/stitch/planos-assinatura/code.html"
                    class="block w-full bg-gold-premium hover:bg-gold-hover text-navy-deep font-bold py-4 rounded-2xl shadow-sm transition-all focus:scale-95">Mudar de Plano</a>
                <button onclick="logout()"
                    class="w-full bg-red-50 dark:bg-red-500/10 hover:bg-red-100 text-red-600 border border-red-200 dark:border-red-500/20 font-bold py-4 rounded-2xl transition-all focus:scale-95">Sair da
                    Conta</button>
            </div>

            <div id="admin-section" class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 text-left">
                <h3 class="text-xs font-black text-gold-premium uppercase tracking-[0.2em] mb-4">Painel de Leads (Admin)</h3>
                <div id="leads-list" class="space-y-2 max-h-[150px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Leads will be injected here -->
                </div>
            </div>
        </div>


        <script>
            function openShareModal() {
                document.getElementById('shareModal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
            function closeShareModal() {
                document.getElementById('shareModal').classList.add('hidden');
                document.body.style.overflow = '';
            }
        </script>
</body>

</html>
