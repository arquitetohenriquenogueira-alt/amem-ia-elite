<!DOCTYPE html>
<html class="light" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Amém IA Kids - Criador de Anjinho</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "premium-gold": "#C8A951",
                        "primary": "#C8A951",
                        "background-light": "#FFFFFF",
                        "slate-custom": "#64748b",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "premium": "12px",
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { font-family: 'Plus Jakarta Sans', sans-serif; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
        .bento-card {
            @apply rounded-premium border border-white/5 bg-white/5 shadow-sm transition-all active:scale-95;
        }
        .category-tab {
            @apply flex flex-col items-center justify-center p-3 rounded-premium transition-all border border-white/5 bg-white/5;
        }
        .category-tab.active {
            @apply border-premium-gold bg-premium-gold/5 ring-1 ring-premium-gold;
        }
        .selection-highlight {
            @apply border-2 border-premium-gold ring-2 ring-premium-gold/20;
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-[#050B18] text-white antialiased">
    <div
        class="relative flex min-h-screen w-full max-w-[430px] mx-auto flex-col bg-[#050B18] overflow-x-hidden shadow-2xl">
        <header
            class="flex items-center px-6 pt-8 pb-4 justify-between sticky top-0 z-50 bg-[#050B18]/90 backdrop-blur-md border-b border-white/5">
            <div
                class="flex size-10 items-center justify-center cursor-pointer bg-white/5 rounded-premium border border-white/10">
                <span class="material-symbols-outlined text-white/60 text-xl">chevron_left</span>
            </div>
            <div class="flex flex-col items-center">
                <h1 class="text-lg font-black tracking-tight text-white uppercase uppercase uppercase">Meu Anjinho</h1>
                <div class="flex items-center gap-1.5">
                    <span class="size-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span>
                    <span
                        class="text-[10px] font-black uppercase tracking-widest text-premium-gold">Personalizando</span>
                </div>
            </div>
            <div
                class="flex size-10 items-center justify-center cursor-pointer bg-white/5 rounded-premium border border-white/10">
                <span class="material-symbols-outlined text-white/60 text-xl">help_outline</span>
            </div>
        </header>
        <main class="flex-1 px-6 pb-40">
            <div class="relative w-full aspect-square my-4 flex items-center justify-center">
                <div
                    class="relative w-full h-full rounded-3xl overflow-hidden bg-white/5 border border-white/5 shadow-inner flex items-center justify-center">
                    <img alt="Avatar Preview" class="w-full h-full object-cover"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBh10T8G4CG3qL0kHd7PBlPwkQHwPvokrN3c_SDIihxsLbR_p2Cz50Bm7rscg1sUOaW-kcgvCa7GD_tb498bSl-wvZLaQbNjmDsMFO-a23_CAkIQJG23GkHB7H-LCcLIhwN7n44L2tDg3eaw7bmS60nlVSk4l-qPIQHaaK_58AW-_WqbwuL3Y1ppiOqMTtzBlVopvFkGfk47vpju-OhtgohSYIA1xTwfB6AVdxtmHh46Eb5OSZ8Yn_OXyJTQcU5uglHfq15UFRc_8um" />
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-3">
                        <button
                            class="size-10 rounded-premium bg-white/10 shadow-sm border border-white/10 flex items-center justify-center backdrop-blur-sm transition-all active:scale-90">
                            <span class="material-symbols-outlined text-white text-xl">refresh</span>
                        </button>
                        <div
                            class="h-10 px-4 bg-white/10 rounded-premium shadow-sm border border-white/10 flex items-center gap-4 backdrop-blur-sm">
                            <span class="material-symbols-outlined text-white/40 text-lg">zoom_in</span>
                            <div class="w-[1px] h-4 bg-white/10"></div>
                            <span class="material-symbols-outlined text-white/40 text-lg">360</span>
                        </div>
                        <button
                            class="size-10 rounded-premium bg-white/10 shadow-sm border border-white/10 flex items-center justify-center backdrop-blur-sm transition-all active:scale-90">
                            <span class="material-symbols-outlined text-white text-xl">fullscreen</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-4 gap-2 mb-8">
                <button class="category-tab active">
                    <span class="material-symbols-outlined text-premium-gold mb-1 fill-1">potted_plant</span>
                    <span class="text-[10px] font-bold uppercase text-white/40 tracking-tight">Asas</span>
                </button>
                <button class="category-tab">
                    <span class="material-symbols-outlined text-blue-400 mb-1">checkroom</span>
                    <span
                        class="text-[10px] font-black uppercase text-white/40 tracking-tight text-center leading-none">Roupas</span>
                </button>
                <button class="category-tab">
                    <span class="material-symbols-outlined text-pink-400 mb-1">face_3</span>
                    <span class="text-[10px] font-bold uppercase text-slate-400 tracking-tight">Rosto</span>
                </button>
                <button class="category-tab">
                    <span class="material-symbols-outlined text-green-400 mb-1">auto_awesome</span>
                    <span class="text-[10px] font-bold uppercase text-slate-400 tracking-tight">Extra</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bento-card p-4 selection-highlight flex flex-col items-center gap-3 relative">
                    <div class="absolute top-2 right-2 bg-premium-gold rounded-full p-0.5">
                        <span class="material-symbols-outlined text-white text-[14px] font-bold">done</span>
                    </div>
                    <div class="w-full aspect-square bg-white/5 rounded-lg flex items-center justify-center">
                        <span
                            class="material-symbols-outlined text-5xl text-premium-gold opacity-80">flutter_dash</span>
                    </div>
                    <p class="font-black text-[11px] text-white/80 uppercase tracking-wider">Asas de Luz</p>
                </div>
                <div class="bento-card p-4 flex flex-col items-center gap-3">
                    <div class="w-full aspect-square bg-white/5 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-5xl text-white/10">cloud</span>
                    </div>
                    <p class="font-black text-[11px] text-white/40 uppercase tracking-wider">Nuvem Fofa</p>
                </div>
                <div class="bento-card p-4 flex flex-col items-center gap-3">
                    <div class="w-full aspect-square bg-white/5 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-5xl text-white/10">toys_fan</span>
                    </div>
                    <p class="font-black text-[11px] text-white/40 uppercase tracking-wider">Dourada</p>
                </div>
                <div class="bento-card p-4 flex flex-col items-center gap-3 opacity-60">
                    <div class="w-full aspect-square bg-white/5 rounded-lg flex items-center justify-center relative">
                        <span class="material-symbols-outlined text-5xl text-white/5">auto_fix_high</span>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="material-symbols-outlined text-white/20 text-2xl">lock</span>
                        </div>
                    </div>
                    <p class="font-black text-[11px] text-white/20 uppercase tracking-wider">Mística</p>
                </div>
            </div>
        </main>
        <div
            class="fixed bottom-0 w-full max-w-[430px] p-6 bg-gradient-to-t from-[#050B18] via-[#050B18]/95 to-transparent z-50">
            <button
                class="w-full bg-premium-gold text-white h-14 rounded-premium font-black text-base shadow-lg shadow-premium-gold/30 flex items-center justify-center gap-3 transition-all active:scale-[0.98] uppercase tracking-widest">
                <span>ESTÁ PRONTO!</span>
                <span class="material-symbols-outlined font-black text-xl">auto_awesome</span>
            </button>
            <nav class="flex justify-around items-center px-4 pt-6">
                <div class="flex flex-col items-center gap-1 opacity-30">
                    <span class="material-symbols-outlined text-2xl">grid_view</span>
                    <span class="text-[9px] font-bold uppercase tracking-tight">Galeria</span>
                </div>
                <div class="flex flex-col items-center gap-1 text-premium-gold">
                    <span class="material-symbols-outlined text-2xl fill-1">face</span>
                    <span class="text-[9px] font-bold uppercase tracking-tight">Criador</span>
                </div>
                <div class="flex flex-col items-center gap-1 opacity-30">
                    <span class="material-symbols-outlined text-2xl">share</span>
                    <span class="text-[9px] font-bold uppercase tracking-tight">Enviar</span>
                </div>
            </nav>
        </div>
    </div>
    </div>

</body>

</html>
