<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Amém IA Pintura Final Padronizada</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "premium-gold": "#C8A951",
                        "deep-navy": "#0A192F",
                        "bento-grey": "#F5F5F7",
                        "border-light": "#E5E7EB",
                    },
                    fontFamily: {
                        "serif": ["Cinzel", "serif"],
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "premium": "12px",
                        "2xl": "1.25rem",
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .bento-sidebar-card {
                @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl shadow-sm transition-transform active:scale-95;
            }
            .color-tap {
                @apply relative aspect-square rounded-xl border-2 border-white shadow-sm active:scale-110 transition-all flex items-center justify-center overflow-hidden;
            }
            .nav-icon {
                @apply flex flex-col items-center gap-1 transition-colors;
            }
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050B18; color: white; }
        .canvas-area {
            box-shadow: inset 0 2px 8px rgba(5, 11, 24, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-[#050B18] text-white antialiased overflow-hidden">
    <div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto bg-[#050B18] shadow-2xl overflow-hidden">
        <header
            class="flex items-center px-6 pt-12 pb-4 justify-between bg-[#050B18]/80 backdrop-blur-md sticky top-0 z-20 border-b border-white/5">
            <button
                class="flex size-10 items-center justify-center rounded-full bg-white/5 text-white border border-white/10">
                <span class="material-symbols-outlined text-xl">arrow_back_ios_new</span>
            </button>
            <div class="text-center">
                <h2 class="text-white font-serif text-xl font-black tracking-tight uppercase drop-shadow-sm">Pinte com
                    Fé</h2>
                <div class="flex items-center justify-center">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-premium-gold">Amém IA Kids</span>
                </div>
            </div>
            <button
                class="flex size-10 items-center justify-center rounded-full bg-white/5 text-white border border-white/10">
                <span class="material-symbols-outlined text-xl">undo</span>
            </button>
        </header>
        <main class="flex-1 flex flex-col gap-4 p-4 overflow-hidden relative z-10 bg-[#050B18] pb-32">
            <div class="flex flex-row gap-4 h-full overflow-hidden">
                <aside class="w-20 flex flex-col gap-4">
                    <div id="color-palette"
                        class="flex-1 bento-sidebar-card p-2 flex flex-col gap-3 items-center overflow-y-auto no-scrollbar">
                        <button class="color-tap bg-[#FF5A5A] w-full" data-color="#FF5A5A"></button>
                        <button class="color-tap bg-[#FF9F43] w-full" data-color="#FF9F43"></button>
                        <button class="color-tap bg-[#FED330] w-full" data-color="#FED330"></button>
                        <button class="color-tap bg-[#26DE81] w-full" data-color="#26DE81"></button>
                        <button class="color-tap bg-[#45AAF2] w-full ring-2 ring-premium-gold ring-offset-2"
                            data-color="#45AAF2"></button>
                        <button class="color-tap bg-[#A55EEA] w-full" data-color="#A55EEA"></button>
                        <button class="color-tap bg-[#FD79A8] w-full" data-color="#FD79A8"></button>
                        <button class="color-tap bg-[#8D6E63] w-full" data-color="#8D6E63"></button>
                        <button class="color-tap bg-[#000000] w-full" data-color="#000000"></button>
                        <button class="color-tap bg-[#FFFFFF] w-full" data-color="#FFFFFF"></button>
                    </div>
                    <div class="h-28 bento-sidebar-card flex flex-col items-center justify-around py-3">
                        <button id="brush-tool" class="text-premium-gold active:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-2xl"
                                style="font-variation-settings: 'FILL' 1">brush</span>
                        </button>
                        <div class="w-8 h-[1px] bg-white/10"></div>
                        <button id="eraser-tool" class="text-white/20 active:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-2xl">ink_eraser</span>
                        </button>
                    </div>
                </aside>
                <section class="flex-1 flex flex-col gap-4 overflow-hidden">
                    <div id="canvas-container"
                        class="flex-1 bg-white rounded-2xl border border-border-light canvas-area overflow-hidden relative touch-none">
                        <canvas id="paint-canvas" class="w-full h-full cursor-crosshair"></canvas>
                        <img id="line-art" alt="Line Art"
                            class="absolute inset-0 w-full h-full object-contain p-2 pointer-events-none opacity-80"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZUmvySyRrzEGSdLPQhttf7zBaH3nXznuv0FiCoaPut-A4kpos_cvNw5wSdGPReSXKlox-iqM1bEgb6r1WGdJQeXk9Dz6mRj5vAvI56_vfdzh8issUUsu_ed00pjku1uyoPclCQLqEbfUDfhJCScAqBzJ9x211PicZs9Wx-J8B-rNR0XRNwlZKIWMH62XM1dQQo6D2rsFXGqN_6amI7Y1U41nn8KClhmKc3BngHjE6zrtCNnpHiv_A7uZ2sdPtPoAtKM-sj1vAu7gi" />
                    </div>
                    <div class="flex gap-2">
                        <button onclick="clearCanvas()"
                            class="flex-1 h-12 bg-white/5 border border-white/10 text-white rounded-premium font-bold text-xs uppercase tracking-widest active:scale-95 transition-all">
                            Limpar
                        </button>
                        <button onclick="saveDrawing()"
                            class="flex-[2] h-12 bg-premium-gold text-white rounded-premium shadow-lg shadow-premium-gold/20 flex items-center justify-center gap-2 active:scale-95 transition-all">
                            <span class="material-symbols-outlined text-xl">check_circle</span>
                            <span class="font-bold tracking-widest">PRONTO!</span>
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // State
        let isDrawing = false;
        let currentColor = '#45AAF2';
        let brushSize = 10;
        let isEraser = false;
        let lastX = 0;
        let lastY = 0;

        // Resize canvas to match display size
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            // Draw a white background so eraser works correctly
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
            setupColorButtons();
            setupTools();
        });

        window.addEventListener('resize', resizeCanvas);

        function setupColorButtons() {
            const buttons = document.querySelectorAll('.color-tap');
            buttons.forEach(btn => {
                btn.onclick = () => {
                    buttons.forEach(b => b.classList.remove('ring-2', 'ring-premium-gold', 'ring-offset-2'));
                    btn.classList.add('ring-2', 'ring-premium-gold', 'ring-offset-2');
                    currentColor = btn.dataset.color || '#45AAF2';
                    isEraser = false;
                    updateToolIcons();
                };
            });
        }

        function setupTools() {
            document.getElementById('brush-tool').onclick = () => {
                isEraser = false;
                updateToolIcons();
            };
            document.getElementById('eraser-tool').onclick = () => {
                isEraser = true;
                updateToolIcons();
            };
        }

        function updateToolIcons() {
            const brush = document.getElementById('brush-tool');
            const eraser = document.getElementById('eraser-tool');
            if (isEraser) {
                brush.classList.replace('text-premium-gold', 'text-white/20');
                brush.querySelector('span').style.fontVariationSettings = "'FILL' 0";
                eraser.classList.replace('text-white/20', 'text-premium-gold');
                eraser.querySelector('span').style.fontVariationSettings = "'FILL' 1";
            } else {
                brush.classList.replace('text-white/20', 'text-premium-gold');
                brush.querySelector('span').style.fontVariationSettings = "'FILL' 1";
                eraser.classList.replace('text-premium-gold', 'text-white/20');
                eraser.querySelector('span').style.fontVariationSettings = "'FILL' 0";
            }
        }

        function startDrawing(e) {
            isDrawing = true;
            const { x, y } = getPos(e);
            [lastX, lastY] = [x, y];
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const { x, y } = getPos(e);

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = isEraser ? 'white' : currentColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.stroke();

            [lastX, lastY] = [x, y];
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        function clearCanvas() {
            if (confirm('Deseja apagar sua pintura e começar de novo?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function saveDrawing() {
            alert('Parabéns! Sua pintura ficou linda. Salvando sua obra de arte...');
            window.location.href = '/stitch/am_m_ia_rea_kids_sementinha/code.html';
        }

        // Pinch to zoom placeholder (basic implementation if needed)
        let initialDist = -1;
        container.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                if (initialDist === -1) {
                    initialDist = dist;
                } else {
                    const scale = dist / initialDist;
                    // Apply scale if desired, but for now we keep it simple
                }
            }
        }, { passive: false });
        container.addEventListener('touchend', () => { initialDist = -1; });
    </script>
</body>

</html>
