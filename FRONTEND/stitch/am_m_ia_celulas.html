<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <title>Células de Fé - Amém IA</title>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="/FRONTEND/stitch/theme-switcher.js" type="module"></script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#FAF7F0] text-[#050B18] transition-colors duration-300; }
            .dark body { @apply bg-[#050B18] text-white; }
        }
        .cell-card {
            @apply bg-white dark:bg-white/5 rounded-3xl border border-[#050B18]/5 dark:border-white/10 p-5 shadow-sm transition-all active:scale-[0.98];
        }
    </style>
</head>

<body class="antialiased">
    <div
        class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col bg-[#FAF7F0] dark:bg-[#050B18] overflow-hidden">
        <header
            class="sticky top-0 z-40 bg-[#FAF7F0]/80 dark:bg-[#050B18]/80 backdrop-blur-md border-b border-[#050B18]/5 dark:border-white/5 px-6 py-8 flex items-center justify-between">
            <button onclick="window.history.back()"
                class="size-10 flex items-center justify-center rounded-full bg-[#050B18]/5 dark:bg-white/5 text-[#050B18] dark:text-white">
                <span class="material-symbols-outlined font-black">arrow_back</span>
            </button>
            <div class="text-center">
                <h1 class="text-lg font-black uppercase tracking-widest text-[#050B18] dark:text-white">Células</h1>
                <span class="text-[9px] font-black uppercase text-premium-gold tracking-[0.3em]">Gestão de Grupos</span>
            </div>
            <button
                class="size-10 flex items-center justify-center rounded-full bg-premium-gold text-white shadow-lg shadow-premium-gold/20">
                <span class="material-symbols-outlined font-black">add</span>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
            <!-- Search -->
            <div
                class="bg-white dark:bg-white/5 rounded-2xl px-4 py-3 flex items-center gap-3 border border-black/5 dark:border-white/10">
                <span class="material-symbols-outlined text-premium-gold">search</span>
                <input type="text" placeholder="Buscar por nome ou bairro..."
                    class="bg-transparent border-none focus:ring-0 text-sm w-full font-bold">
            </div>

            <div class="space-y-4">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-[#050B18]/40 dark:text-white/40 ml-2">
                    Suas Células</h2>

                <!-- Cell 1 -->
                <div class="cell-card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-navy dark:text-white text-base">Célula Shalom</h3>
                            <p class="text-[10px] font-bold text-premium-gold uppercase tracking-widest">Líder: Presb.
                                Marcos</p>
                        </div>
                        <span
                            class="bg-green-500/10 text-green-600 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest">Ativa</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="flex items-center gap-2 text-navy/60 dark:text-white/60">
                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                            <span class="text-[10px] font-bold">Toda Terça, 20h</span>
                        </div>
                        <div class="flex items-center gap-2 text-navy/60 dark:text-white/60">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            <span class="text-[10px] font-bold">Bairro Jardim - Rua das Oliveiras, 120</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-black/5 dark:border-white/5">
                        <div class="flex -space-x-2">
                            <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?q=80&w=100"
                                class="size-6 rounded-full border-2 border-white dark:border-deep-navy object-cover">
                            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=100"
                                class="size-6 rounded-full border-2 border-white dark:border-deep-navy object-cover">
                            <div
                                class="size-6 rounded-full bg-premium-gold flex items-center justify-center text-[8px] text-white font-black border-2 border-white dark:border-deep-navy">
                                +12</div>
                        </div>
                        <button
                            class="text-[10px] font-black text-premium-gold uppercase tracking-widest underline decoration-2 underline-offset-4">Gerenciar</button>
                    </div>
                </div>

                <!-- Cell 2 -->
                <div class="cell-card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-navy dark:text-white text-base">Geração Eleita</h3>
                            <p class="text-[10px] font-bold text-premium-gold uppercase tracking-widest">Líder: Diác.
                                Amanda</p>
                        </div>
                        <span
                            class="bg-blue-500/10 text-blue-600 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest">Jovens</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="flex items-center gap-2 text-navy/60 dark:text-white/60">
                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                            <span class="text-[10px] font-bold">Sábado, 19h</span>
                        </div>
                        <div class="flex items-center gap-2 text-navy/60 dark:text-white/60">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            <span class="text-[10px] font-bold">Centro - Templo Sede</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-black/5 dark:border-white/5">
                        <div class="flex -space-x-2">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=100"
                                class="size-6 rounded-full border-2 border-white dark:border-deep-navy object-cover">
                            <div
                                class="size-6 rounded-full bg-premium-gold flex items-center justify-center text-[8px] text-white font-black border-2 border-white dark:border-deep-navy">
                                +45</div>
                        </div>
                        <button
                            class="text-[10px] font-black text-premium-gold uppercase tracking-widest underline decoration-2 underline-offset-4">Gerenciar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
