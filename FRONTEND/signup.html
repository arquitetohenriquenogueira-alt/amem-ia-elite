<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Ungida - Amém</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/public/styles/global.css?v=EliteHeart">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-[#050B18] text-white min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="w-full max-w-md bg-white/5 border border-white/10 p-8 rounded-[32px] backdrop-blur-xl animate-fade-in">
        <div class="text-center mb-10">
            <div class="logo-pura logo-aura mx-auto mb-6 w-32 h-32 flex items-center justify-center">
                <svg viewBox="0 0 24 24" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                        fill="#C8A951" />
                    <path d="M11 6.5h2v4h4v2h-4v6h-2v-6h-4v-2h4v-4z" fill="#050B18" />
                </svg>
            </div>
            <h1 class="text-32 font-black uppercase tracking-tight mb-2">Jornada <span
                    class="text-premium-gold">Ungida</span></h1>
            <p class="text-white/50 lowercase">Inicie sua jornada no Protocolo Sumaúma.</p>
        </div>

        <form id="signup-form" class="space-y-6">
            <div>
                <label class="block text-12 uppercase tracking-widest text-white/50 mb-2">Nome Completo</label>
                <input type="text" id="fullname" required
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-4 focus:outline-none focus:border-premium-gold transition-all text-white placeholder-white/30"
                    placeholder="Digite seu nome">
            </div>
            <div>
                <label class="block text-12 uppercase tracking-widest text-white/50 mb-2">E-mail</label>
                <input type="email" id="email" required
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-4 focus:outline-none focus:border-premium-gold transition-all text-white placeholder-white/30"
                    placeholder="Seu melhor e-mail">
            </div>
            <div>
                <label class="block text-12 uppercase tracking-widest text-white/50 mb-2">Senha</label>
                <input type="password" id="password" required
                    class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-4 focus:outline-none focus:border-premium-gold transition-all text-white placeholder-white/30"
                    placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit"
                class="btn-premium shimmer-gold w-full h-14 rounded-xl font-black uppercase tracking-widest flex items-center justify-center">
                Criar Conta
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-14 text-white/50">Já tem uma conta? <a href="/login.html"
                    class="text-premium-gold font-bold">Entrar</a></p>
        </div>
    </div>

    <script type="module">
        import { AuthService } from './public/scripts/auth_service.js';

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await AuthService.signUp(email, password, fullName);
                alert('Cadastro realizado! Verifique seu e-mail para confirmar (se habilitado no Supabase) ou tente fazer login.');
                window.location.href = '/FRONTEND/login.html';
            } catch (error) {
                alert('Erro ao cadastrar: ' + error.message);
            }
        });
    </script>
</body>

</html>
